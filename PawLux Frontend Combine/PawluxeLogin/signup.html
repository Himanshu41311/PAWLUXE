<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pawluxe Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container">
    <h1>Sign Up</h1>
    <form id="signupForm">
      <input type="text" name="fullName" placeholder="Full Name" required />
      
      <div class="email-group">
        <input type="email" name="email" placeholder="Email" id="email" required />
        <button type="button" id="verifyEmailBtn">Verify Email</button>
      </div>

      <div id="otpSection" style="display:none;">
        <input type="text" id="otpInput" placeholder="Enter OTP" />
        <button type="button" id="submitOtpBtn">Submit OTP</button>
      </div>

      <input type="text" name="mobileNumber" placeholder="Mobile Number" required />
      <input type="text" name="street" placeholder="Street" required />
      <div class="location-group">
  

  <select name="city" id="citySelect" required>
    <option value="">Select City</option>
    
  </select>

  <select name="state" id="stateSelect" required>
    <option value="">Select State</option>    
  </select>

  <input type="text" name="country" placeholder="Country" value="India" readonly />
</div>

      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirmPassword" placeholder="Confirm Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adopt ${animal.name} | Pawluxe</title>
  <link rel="stylesheet" href="pet.css" />
  <script defer src="pet.js"></script>
</head>
<body>
  <div class="pet-container">
    <div class="media-section">
      <div id="mainMedia" class="main-media"></div>
      <div id="mediaThumbnails" class="media-thumbnails"></div>
    </div>

    <div class="details-section">
      <h1 id="petName">Pet Name</h1>
      <div class="breed" id="petBreed"></div>
      <div class="gender-age" id="petAgeGender"></div>
      <p class="price" id="petPrice"></p>
      <p class="description" id="petDescription"></p>
      <p class="location" id="ownerInfo"></p>

      <button class="adopt-btn" onclick="finalizeAdoption()">Take Me Home ❤️</button>
    </div>
  </div>
</body>
</html>
